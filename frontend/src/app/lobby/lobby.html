<main>
  <section>
    <h2>Join Game</h2>
    @if (joinableGames().rows.length === 0) {
    <p>No other games</p>
    } @else {
    <ul>
      @for(game of joinableGames().rows; track game.gameId) {
      <li (click)="joinGame(game.gameId)">{{game.name}}</li>
      }
    </ul>
    }
  </section>
  <section>
    <h2>Create Game</h2>
    <input type="text" [value]="newGameName()" (input)="newGameName.set($event.target.value)" />
    <button (click)="createGame()">Create</button>
  </section>
</main>
